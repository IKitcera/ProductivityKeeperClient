<!--      SPINNER-->
@if (isLoading$ | async) {
  <div class="spinner-wrap task-spinner stat-spinner flex justify-center items-center">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>
}

@if (!noTimer) {
  <div class="container">
    <div class="timerContent">
      <div class="label flex flex-row flex-wrap items-center justify-start">
        <h2>
          <mat-icon>flag</mat-icon>
          {{ (timer$ | async).label }}
        </h2>
      </div>
      <h4 class="medGray">
        <pre>{{ getFormatString() }}</pre>
      </h4>
      <h4 class="medGray">
        <pre><span class="usualFrontFamily">{{ goalValue.toString() }}</span></pre>
      </h4>
      <h2 class="centered large">
        <pre><span>{{ currentValue.toString() }}</span></pre>
      </h2>
      <div class="flex flex-row justify-center items-center">
        <button class="action-btn" mat-stroked-button [disabled]="isTicking" (click)="start()">
          <div class="action-btn-content">
            <mat-icon>play_arrow</mat-icon>
            <p>Start</p>
          </div>
        </button>
        <button class="action-btn" mat-stroked-button [disabled]="!isTicking" (click)="pause()">
          <div class="action-btn-content">
            <mat-icon>pause</mat-icon>
            <p>Pause</p>
          </div>
        </button>
        <button class="action-btn" mat-stroked-button (click)="stop()">
          <div class="action-btn-content">
            <mat-icon>stop</mat-icon>
            <p>Stop</p>
          </div>
        </button>
      </div>
      <div class="topright flex flex-row">
        <mat-icon (click)="editTimer()">edit</mat-icon>
        <mat-icon (click)="deleteTimer()">delete_outline</mat-icon>
      </div>
    </div>
  </div>
}

@if (!(isLoading$ | async) && noTimer) {
  <div class="flex flex-row justify-center items-center">
    <button color="primary" mat-stroked-button (click)="editTimer()">
      Add specific timer
    </button>
  </div>
}
