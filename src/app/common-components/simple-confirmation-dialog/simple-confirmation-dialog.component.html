<div class="flex flex-col p-2">
  <h4 class="flex flex-row items-center">{{this.data.label}}</h4>
  <div class="flex flex-row justify-evenly items-center">
      <button mat-raised-button class="p-5" (click)="confirm()" color="accent">
        Confirm
      </button>
      <button mat-stroked-button class="p-5" (click)="close()">
        Cancel
      </button>
    </div>
</div>
